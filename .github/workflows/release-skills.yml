name: Release skills

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check
      - run: node packages/cli/dist/index.js publish-cloud-ui --dir .
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cloud-ui
      - id: deployment
        uses: actions/deploy-pages@v4
