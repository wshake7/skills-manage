name: Update skills

on:
  workflow_dispatch:
  schedule:
    - cron: "41 2 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter skills-manage build
      - run: pnpm --filter skills-manage exec skills-manage ai-update --layer cloud --dir ../..
