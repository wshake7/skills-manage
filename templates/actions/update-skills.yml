name: Update skills

on:
  workflow_dispatch:
  schedule:
    - cron: "41 2 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
      GH_TOKEN: ${{ secrets.SKILLS_MANAGE_PR_TOKEN || github.token }}
      UPDATE_BRANCH: skills-manage/update-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Create update branch
        run: git checkout -b "${UPDATE_BRANCH}"
      - run: node packages/cli/dist/index.js ai-update --layer cloud --dir .
      - name: Open generated skills pull request
        run: |
          if [ -z "$(git status --porcelain -- .agents/skills .agents/skill-archives)" ]; then
            echo "No generated skill changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agents/skills .agents/skill-archives
          git commit -m "Update generated skills"
          git push --set-upstream origin "${UPDATE_BRANCH}"
          if gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "${UPDATE_BRANCH}" \
            --title "Update generated skills" \
            --body "This PR was generated by the Update skills workflow. It updates generated skills and archives previous skill versions under .agents/skill-archives. Pull requests are GitHub issues, so review and discussion should happen here before merging."; then
            exit 0
          fi
          echo "::warning title=Pull request was not created::GitHub refused PR creation with the current token. Enable 'Allow GitHub Actions to create and approve pull requests' in repository Actions settings, or add a fine-grained PAT secret named SKILLS_MANAGE_PR_TOKEN with Contents: read/write and Pull requests: read/write."
          echo "The update branch was pushed successfully. Open the PR manually:"
          echo "https://github.com/${GITHUB_REPOSITORY}/pull/new/${UPDATE_BRANCH}"
