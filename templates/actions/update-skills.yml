name: Update skills

on:
  workflow_dispatch:
  schedule:
    - cron: "41 2 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node packages/cli/dist/index.js ai-update --layer cloud --dir .
      - name: Commit generated skills
        run: |
          if [ -z "$(git status --porcelain -- .agents/skills)" ]; then
            echo "No generated skill changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agents/skills
          git commit -m "Update generated skills"
          git push
