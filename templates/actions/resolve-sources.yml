name: Resolve sources

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter skills-manage build
      - run: pnpm --filter skills-manage exec skills-manage sync --layer cloud
